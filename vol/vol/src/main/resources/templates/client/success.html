<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta ch$set="UTF-8">
    <title>Mes Réservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .reservation-cd {
            border: none;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .reservation-cd:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .btn-navy {
            background-color: #001f3f;
            color: white;
            border-radius: 30px;
        }

        .btn-navy:hover {
            background-color: #001933;
        }

        .label {
            font-weight: 500;
            color: #555;
        }

        .value {
            font-weight: 600;
            color: #222;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            mgin-bottom: 10px;
        }

        .price-group {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .price-box {
            flex: 1;
            background-color: #f0f2f5;
            padding: 10px 15px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container mx-auto mt-8 px-4 sm:px-6 lg:px-8">
    <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">
        🧾 Mes Réservations
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" th:if="${reservations != null && !reservations.isEmpty()}">
        <div class="bg-white rounded-lg shadow-md p-6 hover:shadow-lg transition-shadow duration-300" th:each="res : ${reservations}">
            <h5 class="text-xl font-semibold text-gray-900 mb-4">
                ✈️ Vol <span th:text="${res.volId}"></span> • Réservation #<span th:text="${res.reservationId}"></span>
            </h5>

            <div class="space-y-3">
                <div class="flex justify-between">
                    <span class="text-gray-600 font-medium">📅 Date :</span>
                    <span class="text-gray-800" th:text="${res.dateReservation}"></span>
                </div>

                <div class="flex justify-between">
                    <span class="text-gray-600 font-medium">👤 Passager :</span>
                    <span class="text-gray-800" th:text="${res.mailPassager}"></span>
                </div>

                <div class="flex justify-between">
                    <span class="text-gray-600 font-medium">🎟️ Siège :</span>
                    <span class="text-gray-800" th:text="${res.typeSiege}"></span>
                </div>

                <div class="grid grid-cols-2 gap-4 my-4">
                    <div class="bg-gray-50 p-4 rounded-md">
                        <span class="text-gray-600 font-medium">🧑 Adultes :</span><br>
                        <span class="text-gray-800 font-semibold" th:text="${res.siegeAdulte} + ' places'"></span><br>
                        <span class="text-gray-600 font-medium mt-2 block">💰 Prix :</span>
                        <span class="text-gray-800 font-semibold" th:text="${res.prix} + ' $'"></span>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-md">
                        <span class="text-gray-600 font-medium">👶 Enfants :</span><br>
                        <span class="text-gray-800 font-semibold" th:text="${res.siegeEnfant} + ' places'"></span><br>
                        <span class="text-gray-600 font-medium mt-2 block">💰 Prix :</span>
                        <span class="text-gray-800 font-semibold" th:text="${res.prix} + ' $'"></span>
                    </div>
                </div>

                <div class="flex justify-between">
                    <span class="text-gray-600 font-medium">🔖 Statut :</span>
                    <span class="text-gray-800" th:text="${res.statutReservation}"></span>
                </div>
            </div>

            <div class="mt-6 flex space-x-4">
                <form th:action="@{/api/reservations/annuler}" method="post" class="w-full">
                    <input type="hidden" name="reservationId" th:value="${res.reservationId}" />
                    <button type="submit" class="w-full bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 transition-colors duration-200">
                        ❌ Annuler la réservation
                    </button>
                </form>

                <button type="button" class="w-full bg-gray-600 text-white py-2 px-4 rounded-md hover:bg-gray-700 transition-colors duration-200" 
                        th:attr="data-id=${res.idReservationDetail}" onclick="exportReservation(this)">
                    📄 Exporter la réservation
                </button>
            </div>
        </div>
    </div>

    <div th:if="${reservations == null || reservations.isEmpty()}" class="bg-blue-100 text-blue-800 p-4 rounded-md text-center mt-8">
        Aucune réservation trouvée pour ce passager.
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

<script>
    function exportReservation(button) {
        const id = button.getAttribute("data-id");
        if (!id) {
            alert("Aucun ID de réservation trouvé !");
            return;
        }
        fetch(`/api/reservations/export/${id}`, {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) throw new Error("Erreur lors de l'export");
            return response.json();
        })
        .then(data => {
            console.log("✔️ Détail exporté :", data);

            // 2️⃣ Appel à /temp pour confirmer que la donnée est bien stockée
            return fetch('/api/reservations/temp', {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            });
        })
        .then(response => {
            if (!response.ok) throw new Error("Erreur lors de la récupération depuis /temp");
            return response.json();
        })
        .then(tempData => {
            console.log("📦 Récupéré depuis /temp :", tempData);
            alert("Export réussi ! Voir l'autre onglet pour le fichier.");
        })
        .catch(error => {
            console.error("❌ Erreur :", error);
            alert("Erreur pendant l'export ou la récupération.");
        });
    }
</script>



</body>
</html>
