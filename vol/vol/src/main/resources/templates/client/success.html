<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta ch$set="UTF-8">
    <title>Mes Réservations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .reservation-cd {
            border: none;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .reservation-cd:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .btn-navy {
            background-color: #001f3f;
            color: white;
            border-radius: 30px;
        }

        .btn-navy:hover {
            background-color: #001933;
        }

        .label {
            font-weight: 500;
            color: #555;
        }

        .value {
            font-weight: 600;
            color: #222;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            mgin-bottom: 10px;
        }

        .price-group {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }

        .price-box {
            flex: 1;
            background-color: #f0f2f5;
            padding: 10px 15px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-5 fw-bold text-prim$y">🧾 Mes Réservations</h2>

    <div class="row g-4" th:if="${reservations != null && !reservations.isEmpty()}">
        <div class="col-md-6" th:each="res : ${reservations}">
            <div class="c$d reservation-c$d p-4">
                <h5 class="mb-4 fw-semibold text-d$k">
                    ✈️ Vol <span th:text="${res.volId}"></span> • Réservation #<span th:text="${res.reservationId}"></span>
                </h5>

                <div class="info-row">
                    <span class="label">📅 Date :</span>
                    <span class="value" th:text="${res.dateReservation}"></span>
                </div>

                <div class="info-row">
                    <span class="label">👤 Passager :</span>
                    <span class="value" th:text="${res.mailPassager}"></span>
                </div>

                <div class="info-row">
                    <span class="label">🎟️ Siège :</span>
                    <span class="value" th:text="${res.typeSiege}"></span>
                </div>

                <div class="price-group my-3">
                    <div class="price-box">
                        <span class="label">🧑 Adultes :</span><br>
                        <span class="value" th:text="${res.siegeAdulte} + ' places'"></span><br>
                        <span class="label mt-2 d-block">💰 Prix :</span>
                        <span class="value" th:text="${res.prix} + ' $'"></span>
                    </div>

                    <div class="price-box">
                        <span class="label">👶 Enfants :</span><br>
                        <span class="value" th:text="${res.siegeEnfant} + ' places'"></span><br>
                        <span class="label mt-2 d-block">💰 Prix :</span>
                        <span class="value" th:text="${res.prix} + ' $'"></span>
                    </div>
                </div>

                <div class="info-row">
                    <span class="label">🔖 Statut :</span>
                    <span class="value" th:text="${res.statutReservation}"></span>
                </div>

                <form th:action="@{/api/reservations/annuler}" method="post" class="mt-4 d-grid">
                    <input type="hidden" name="idReservationDetail" th:value="${res.idReservationDetail}" />
                    <button type="submit" class="btn btn-navy">❌ Annuler la réservation</button>
                </form>

                <br>
                <!-- Bouton Exporter -->
                <button type="button" class="btn btn-secondary" th:attr="data-id=${res.idReservationDetail}" onclick="exportReservation(this)">
                    📄 Exporter la réservation
                </button>


            </div>
        </div>
    </div>

    <div th:if="${reservations == null || reservations.isEmpty()}" class="alert alert-info text-center mt-5">
        Aucune réservation trouvée pour ce passager.
    </div>
</div>

<script>
    function exportReservation(button) {
        const id = button.getAttribute("data-id");
        fetch(`/api/reservations/export/${id}`, {
            method: 'GET',
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) throw new Error("Erreur lors de l'export");
            return response.json();
        })
        .then(data => {
            // Afficher ou télécharger les données exportées
            console.log("Données exportées :", data);
            alert("Export réussi ! Voir la console pour les données.");
        })
        .catch(error => {
            console.error(error);
            alert("Erreur lors de l'export.");
        });
    }
</script>


</body>
</html>
